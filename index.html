<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1320">
<title>SwimFit Coach</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SwimFit">
<style>
  :root{
    --bg:#0b1320;
    --bg-2:#101b2d;
    --card:#13203a;
    --line:#223354;
    --text:#eaf0ff;
    --muted:#8ba0c9;
    --accent:#3fd0c9; /* pool teal */
    --accent-2:#ff8a3d; /* power orange */
    --good:#5fd97a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,var(--bg) 0%, var(--bg-2) 100%);
    color:var(--text); min-height:100vh; padding-bottom:90px;
  }
  header{
    padding:24px 20px 16px; position:sticky; top:0; z-index:10;
    background:rgba(11,19,32,0.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  header h1{margin:0; font-size:22px; letter-spacing:0.5px;}
  header h1 span{color:var(--accent);}
  header .sub{color:var(--muted); font-size:13px; margin-top:4px;}
  .tabs{display:flex; gap:8px; padding:14px 20px 0; overflow-x:auto;}
  .tab{
    flex:0 0 auto; padding:9px 16px; border-radius:20px; font-size:13px; font-weight:600;
    background:var(--card); color:var(--muted); border:1px solid var(--line); white-space:nowrap;
  }
  .tab.active{background:var(--accent); color:#04201d; border-color:var(--accent);}
  main{padding:18px 20px 0;}
  .day-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px; margin-bottom:16px;
  }
  .day-card h2{margin:0 0 2px; font-size:18px;}
  .day-card .tag{color:var(--accent); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px;}
  .section-label{
    margin:16px 0 8px; font-size:11px; text-transform:uppercase; letter-spacing:1.5px;
    color:var(--muted); font-weight:700;
  }
  .ex-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:11px 0; border-bottom:1px solid var(--line); gap:10px;
  }
  .ex-row:last-child{border-bottom:none;}
  .ex-info{flex:1;}
  .ex-name{font-size:14.5px; font-weight:600;}
  .ex-detail{font-size:12px; color:var(--muted); margin-top:2px;}
  .ex-check{
    width:26px; height:26px; border-radius:8px; border:2px solid var(--line);
    flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    font-size:14px; color:transparent;
  }
  .ex-check.done{background:var(--good); border-color:var(--good); color:#06210c;}
  .note-box{
    background:rgba(63,208,201,0.08); border:1px solid rgba(63,208,201,0.25);
    border-radius:10px; padding:10px 12px; font-size:12.5px; color:#bfe9e6; margin-top:14px;
  }
  .nutri-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;}
  .nutri-box{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px;}
  .nutri-box .val{font-size:20px; font-weight:800; color:var(--accent-2);}
  .nutri-box .lbl{font-size:11.5px; color:var(--muted); margin-top:2px;}
  .log-form{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:16px;}
  .log-form label{font-size:12px; color:var(--muted); display:block; margin-bottom:5px; margin-top:10px;}
  .log-form input, .log-form textarea, .log-form select{
    width:100%; padding:10px; border-radius:9px; border:1px solid var(--line);
    background:var(--bg-2); color:var(--text); font-size:14px; font-family:inherit;
  }
  .btn{
    margin-top:14px; width:100%; padding:13px; border-radius:10px; border:none;
    background:var(--accent); color:#04201d; font-weight:700; font-size:14.5px;
  }
  .log-entry{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:10px; font-size:13px;
  }
  .log-entry .d{color:var(--accent); font-weight:700; font-size:12px;}
  nav.bottom{
    position:fixed; bottom:0; left:0; right:0; display:flex;
    background:rgba(11,19,32,0.95); backdrop-filter:blur(10px);
    border-top:1px solid var(--line); padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  }
  nav.bottom button{
    flex:1; background:none; border:none; color:var(--muted); font-size:11px;
    display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 0;
  }
  nav.bottom button.active{color:var(--accent);}
  nav.bottom .ic{font-size:19px;}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:30px 10px;}
  .install-banner{
    background:var(--accent-2); color:#2a1300; padding:10px 16px; font-size:12.5px;
    display:none; align-items:center; justify-content:space-between; gap:10px;
  }
  .install-banner button{background:#2a1300; color:#ffcfa8; border:none; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:700;}
</style>
</head>
<body>

<div class="install-banner" id="installBanner">
  <span>Install this as an app on your home screen</span>
  <button id="installBtn">Install</button>
</div>

<header>
  <h1>Swim<span>Fit</span> Coach</h1>
  <div class="sub">Week <span id="weekNum">1</span> · 4-day lift split · built around your swim schedule</div>
</header>

<div class="tabs" id="dayTabs"></div>

<main id="workoutView"></main>
<main id="nutritionView" style="display:none;"></main>
<main id="logView" style="display:none;"></main>

<nav class="bottom">
  <button class="active" data-view="workoutView"><span class="ic">🏋️</span>Workout</button>
  <button data-view="nutritionView"><span class="ic">🍽️</span>Nutrition</button>
  <button data-view="logView"><span class="ic">📊</span>Progress</button>
</nav>

<script src="data.js"></script>
<script src="app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js");
    });
  }
</script>
</body>
</html>
