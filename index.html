<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>SwimFit Coach</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SwimFit">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@700;800&family=Lexend:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --bg-2:#131313;
    --card:rgba(30,30,30,0.6);
    --card-solid:#1c1b1b;
    --line:rgba(255,255,255,0.1);
    --text:#e5e2e1;
    --muted:#9a9c93;
    --accent:#19d3ff;       /* electric blue (was lime green) */
    --accent-dim:rgba(25,211,255,0.14);
    --accent-2:#19d3ff;     /* unify accent for stat highlights */
    --on-accent:#04212b;
    --good:#19d3ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:'Lexend',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text); min-height:100vh; padding-bottom:96px;
  }
  header{
    padding:22px 20px 16px; position:sticky; top:0; z-index:10;
    background:rgba(10,10,10,0.85); backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  header h1{
    margin:0; font-family:'Anybody',sans-serif; font-size:22px; font-weight:800;
    letter-spacing:0.5px; text-transform:uppercase; color:var(--text);
  }
  header h1 span{color:var(--accent); text-shadow:0 0 18px rgba(25,211,255,0.5);}
  header .sub{
    color:var(--muted); font-size:11px; margin-top:4px; font-family:'JetBrains Mono',monospace;
    letter-spacing:0.06em; text-transform:uppercase;
  }
  .tabs{display:flex; gap:8px; padding:16px 20px 0; overflow-x:auto;}
  .tab{
    flex:0 0 auto; padding:9px 18px; border-radius:9999px; font-size:12px; font-weight:600;
    font-family:'JetBrains Mono',monospace; letter-spacing:0.04em; text-transform:uppercase;
    background:var(--card-solid); color:var(--muted); border:1px solid var(--line); white-space:nowrap;
  }
  .tab.active{
    background:var(--accent); color:var(--on-accent); border-color:var(--accent);
    box-shadow:0 0 20px rgba(25,211,255,0.35);
  }
  main{padding:18px 20px 0;}
  .day-card{
    background:var(--card); backdrop-filter:blur(20px); border:1px solid var(--line); border-radius:24px;
    padding:20px; margin-bottom:16px;
  }
  .day-card h2{margin:2px 0 0; font-family:'Anybody',sans-serif; font-size:20px; font-weight:800; letter-spacing:0.2px;}
  .day-card .tag{
    color:var(--accent); font-size:11px; font-weight:600; text-transform:uppercase;
    letter-spacing:0.12em; font-family:'JetBrains Mono',monospace;
    background:var(--accent-dim); display:inline-block; padding:4px 10px; border-radius:9999px;
  }
  .section-label{
    margin:18px 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:0.12em;
    color:var(--muted); font-weight:600; font-family:'JetBrains Mono',monospace;
  }
  .ex-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:13px 0; border-bottom:1px solid var(--line); gap:10px;
  }
  .ex-row:last-child{border-bottom:none;}
  .ex-info{flex:1;}
  .ex-name{font-size:14.5px; font-weight:600; color:var(--text);}
  .ex-detail{font-size:12px; color:var(--muted); margin-top:3px; font-family:'JetBrains Mono',monospace; letter-spacing:0.01em;}
  .ex-check{
    width:28px; height:28px; border-radius:8px; border:2px solid var(--line);
    flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    font-size:14px; color:transparent; background:rgba(255,255,255,0.03);
  }
  .ex-check.done{
    background:var(--accent); border-color:var(--accent); color:var(--on-accent);
    box-shadow:0 0 14px rgba(25,211,255,0.45);
  }
  .note-box{
    background:var(--accent-dim); border:1px solid rgba(25,211,255,0.25);
    border-radius:14px; padding:12px 14px; font-size:12.5px; color:#bdeeff; margin-top:16px; line-height:1.5;
  }
  .nutri-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;}
  .nutri-box{background:var(--card); backdrop-filter:blur(20px); border:1px solid var(--line); border-radius:18px; padding:16px;}
  .nutri-box .val{font-family:'Anybody',sans-serif; font-size:22px; font-weight:800; color:var(--accent); text-shadow:0 0 16px rgba(25,211,255,0.3);}
  .nutri-box .lbl{font-size:11px; color:var(--muted); margin-top:4px; font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:0.06em;}
  .log-form{background:var(--card); backdrop-filter:blur(20px); border:1px solid var(--line); border-radius:18px; padding:18px; margin-bottom:16px;}
  .log-form h2{font-family:'Anybody',sans-serif; font-weight:800;}
  .log-form label{font-size:11px; color:var(--muted); display:block; margin-bottom:6px; margin-top:12px; font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:0.06em;}
  .log-form input, .log-form textarea, .log-form select{
    width:100%; padding:11px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg-2); color:var(--text); font-size:14px; font-family:'Lexend',inherit;
  }
  .log-form select:focus, .log-form textarea:focus, .log-form input:focus{outline:1px solid var(--accent);}
  .btn{
    margin-top:16px; width:100%; padding:14px; border-radius:9999px; border:none;
    background:var(--accent); color:var(--on-accent); font-weight:700; font-size:14.5px;
    box-shadow:0 0 24px rgba(25,211,255,0.4); font-family:'Lexend',sans-serif;
  }
  .log-entry{
    background:var(--card); backdrop-filter:blur(20px); border:1px solid var(--line); border-radius:16px;
    padding:13px 15px; margin-bottom:10px; font-size:13px;
  }
  .log-entry .d{color:var(--accent); font-weight:600; font-size:11px; font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:0.06em;}
  nav.bottom{
    position:fixed; bottom:0; left:0; right:0; display:flex;
    background:rgba(10,10,10,0.9); backdrop-filter:blur(20px);
    border-top:1px solid var(--line); padding:10px 6px calc(10px + env(safe-area-inset-bottom));
  }
  nav.bottom button{
    flex:1; background:none; border:none; color:var(--muted); font-size:10.5px;
    display:flex; flex-direction:column; align-items:center; gap:5px; padding:6px 0;
    font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:0.04em;
  }
  nav.bottom button.active{color:var(--accent); text-shadow:0 0 12px rgba(25,211,255,0.5);}
  nav.bottom .ic{font-size:19px;}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:30px 10px;}
  .install-banner{
    background:var(--accent); color:var(--on-accent); padding:10px 16px; font-size:12.5px;
    display:none; align-items:center; justify-content:space-between; gap:10px; font-weight:600;
  }
  .install-banner button{background:var(--on-accent); color:var(--accent); border:none; padding:7px 14px; border-radius:9999px; font-size:12px; font-weight:700;}
</style>
</head>
<body>

<div class="install-banner" id="installBanner">
  <span>Install this as an app on your home screen</span>
  <button id="installBtn">Install</button>
</div>

<header>
  <h1>Swim<span>Fit</span> Coach</h1>
  <div class="sub">Week <span id="weekNum">1</span> · 4-day lift split · built around your swim schedule</div>
</header>

<div class="tabs" id="dayTabs"></div>

<main id="workoutView"></main>
<main id="nutritionView" style="display:none;"></main>
<main id="logView" style="display:none;"></main>

<nav class="bottom">
  <button class="active" data-view="workoutView"><span class="ic">🏋️</span>Workout</button>
  <button data-view="nutritionView"><span class="ic">🍽️</span>Nutrition</button>
  <button data-view="logView"><span class="ic">📊</span>Progress</button>
</nav>

<script src="data.js"></script>
<script src="app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js");
    });
  }
</script>
</body>
</html>
